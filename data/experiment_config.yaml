experiment:
  name: >-
    Aprendendo Conceitos de Orientação a Objetos com auxílio da Inteligência
    Artificial
  summary: >-
    <p>A Inteligência Artificial tem sido cada vez mais utilizada como
    ferramenta de apoio ao aprendizado permitindo que pessoas explorem novos
    conteúdos de forma interativa e no seu próprio ritmo.</p><p>Nesta atividade,
    você irá explorar conceitos fundamentais de orientação a objetos utilizando
    um sistema de chat com inteligência artificial disponibilizado dentro deste
    sistema.</p><p><br></p><p>Ao final seu objetivo é aprender o máximo possível
    sobre o conceito de <strong>Herança, Polimorfismo e Classes
    Abstratas</strong>. Você pode investigar diferentes aspectos do conteúdo de
    acordo com o seu interesse e com o que for aprendendo no decorrer da
    interação. Não há um caminho único ou sequência obrigatória, você é livre
    para fazer perguntas, solicitar explicações, pedir exemplos e avançar
    conforme sua curiosidade e interesse.</p><p><br></p><p>Durante a atividade,
    você deverá utilizar exclusivamente a interface de chat deste sistema. Ou
    seja, o uso de materiais externos, como mecanismos de busca (ex.: Google),
    outras ferramentas de chat, vídeos, aulas online ou livros, <strong>não é
    permitido</strong>, pois o foco do estudo é compreender o aprendizado a
    partir da interação com este sistema.</p><p><br></p><p><strong style="color:
    rgb(68, 68, 68);">Vocês têm 1h30 para terminar a etapa de exploração.
    </strong>Ao final da atividade, você deverá <strong>realizar uma atividade
    sobre o que aprendeu</strong> ao longo do estudo.</p>
  typeExperiment: between-subject
  betweenExperimentType: random
  icf:
    title: TERMO DE CONSENTIMENTO LIVRE E ESCLARECIDO (TCLE)
    description: >-
      <h3>Título da Pesquisa:</h3><p><strong>Aprendendo Conceitos de Orientação
      a Objetos com auxílio da Inteligência
      Artificial</strong></p><p><strong>Pesquisador(es)
      Responsável(is):</strong></p><p>Thiago José Lopes</p><p>Yeshuá Silveira de
      Souza Siqueira</p><p>Jairo Francisco de Souza</p><p>Marcelo de Oliveira
      Costa Machado</p><p><br></p><p>Instituição: <strong>Universidade Federal
      de Juiz de Fora </strong></p><p><br></p><p><strong>Contato dos
      Pesquisadores:</strong></p><p><span style="color: rgb(68, 68,
      68);">thiago.jose@estudante.ufjf.br</span></p><p><span style="color:
      rgb(68, 68, 68);">yeshua@estudante.ufjf.br</span></p><p><span
      style="color: rgb(68, 68, 68);">jairo.souza@ufjf.br</span></p><p><span
      style="color: rgb(68, 68,
      68);">marcelo.machado@ufjf.br</span></p><p><br></p><h3>1. Apresentação da
      Pesquisa</h3><p>Você está sendo convidado(a) a participar de uma pesquisa
      científica que investiga como pessoas aprendem novos conteúdos por meio da
      interação com sistemas de inteligência artificial baseados em
      chat.</p><p>Sua participação é voluntária e você poderá desistir a
      qualquer momento, sem qualquer prejuízo.</p><h3>2. Objetivo da
      Pesquisa</h3><p>O objetivo deste estudo é analisar como indivíduos
      aprendem conceitos básicos orientação a objetos utilizando exclusivamente
      a interação com um sistema conversacional baseado em inteligência
      artificial.</p><h3>3. Procedimentos</h3><p>Caso aceite participar, você
      realizará as seguintes atividades:</p><ul><li>Responder a um questionário
      inicial sobre seu perfil e conhecimentos prévios</li><li>Participar de uma
      sessão de aprendizagem com duração de até 2 horas utilizando um sistema de
      chat com inteligência artificial</li><li>Responder a um questionário final
      sobre sua experiência e o conteúdo aprendido</li></ul><p>Durante a
      atividade, sua interação com o sistema poderá ser registrada para fins de
      análise.</p><h3>4. Riscos e Desconfortos</h3><p>Os riscos envolvidos nesta
      pesquisa são considerados mínimos, podendo incluir:</p><ul><li>Cansaço
      mental devido ao tempo de atividade</li><li>Dificuldade ou frustração
      durante o processo de aprendizagem</li></ul><p>Você poderá interromper sua
      participação a qualquer momento, caso se sinta desconfortável.</p><h3>5.
      Benefícios</h3><p>Os possíveis benefícios incluem:</p><ul><li>Aprendizado
      de conceitos importantes de orientação a objetos</li><li>Contribuição para
      pesquisas nas áreas de educação e inteligência artificial</li></ul><p>Não
      há garantia de benefícios diretos.</p><h3>6. Confidencialidade e Uso dos
      Dados</h3><ul><li>Os dados coletados serão tratados de forma
      confidencial</li><li>Nenhuma informação que permita sua identificação será
      divulgada</li><li>Os dados poderão incluir respostas aos questionários e
      interações com o sistema</li><li>As informações serão utilizadas
      exclusivamente para fins acadêmicos e científicos</li></ul><h3>7.
      Participação Voluntária e Direito de Desistência</h3><p>Sua participação é
      totalmente voluntária.</p><p>Você pode recusar participar ou desistir a
      qualquer momento, sem qualquer penalização ou prejuízo.</p><h3>8.
      Esclarecimentos e Contato</h3><p>Caso tenha dúvidas sobre a pesquisa, você
      poderá entrar em contato com a equipe de pesquisadores por meio dos
      contatos informados acima.</p><h3>9. Consentimento</h3><p>Ao prosseguir
      com a participação neste estudo, você declara que:</p><ul><li>Leu e
      compreendeu as informações apresentadas neste termo</li><li>Teve a
      oportunidade de esclarecer dúvidas</li><li>Concorda voluntariamente em
      participar da pesquisa</li></ul>
